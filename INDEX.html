<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - Fix Carga</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        #reader { width: 100% !important; border-radius: 20px; overflow: hidden; background: #000; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; text-align: center; }
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-green { background: var(--s); color: white; }
        .btn-gray { background: #64748b; color: white; }
        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed var(--p); }
        
        /* BARRA DE CARGA MEJORADA */
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; margin: 20px 0; display: none; height: 30px; position: relative; border: 1px solid #cbd5e1; }
        #prog-bar { height: 100%; background: var(--s); width: 0%; transition: width 0.2s; border-radius: 9px; }
        #prog-text { position: absolute; width: 100%; text-align: center; top: 5px; font-size: 0.85rem; font-weight: bold; color: #1e293b; }
        #debug-msg { font-size: 0.8rem; color: var(--p); text-align: center; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--p); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; border-radius:10px; border:none; margin-bottom:15px; text-align:center;">
        <button onclick="access()" style="width:150px; background:white;">ENTRAR</button>
    </div>

    <header>INVENTARIO PRO</header>

    <div class="container">
        <div id="reader"></div>
        <div id="result-card" class="card">
            <h2 id="res-nombre"></h2>
            <h1 id="res-precio" style="color:var(--s)"></h1>
            <p id="res-stock"></p>
            <button class="btn-green" onclick="resetScanner()">SIGUIENTE</button>
        </div>

        <button id="admin-btn" style="display:none;" class="btn-gray" onclick="toggleAdmin()">⚙️ PANEL ADMIN</button>

        <div id="admin-panel">
            <h3>Carga Masiva</h3>
            <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
            
            <div id="debug-msg"></div>
            <div id="prog-container" class="progress-container">
                <div id="prog-bar"></div>
                <div id="prog-text">0%</div>
            </div>

            <button class="btn-green" id="upload-btn" onclick="uploadData()">🚀 SUBIR A FIREBASE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentCode = "";

        const scanner = new Html5Qrcode("reader");

        function access() {
            const p = document.getElementById('pin').value;
            if(p === "1234") { 
                document.getElementById('admin-btn').style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                initScanner();
            }
        }

        function initScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (code) => {
                onScan(code);
            }).catch(e => console.log(e));
        }

        async function onScan(code) {
            await scanner.pause(true);
            const doc = await db.collection("productos").doc(code).get();
            document.getElementById('result-card').style.display = 'block';
            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre;
                document.getElementById('res-precio').innerText = `$${p.precio}`;
                document.getElementById('res-stock').innerText = `Stock: ${p.stock}`;
            } else {
                document.getElementById('res-nombre').innerText = "NO ENCONTRADO";
            }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // --- CARGA MASIVA REPARADA ---
        async function uploadData() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona el CSV");

            const barContainer = document.getElementById('prog-container');
            const bar = document.getElementById('prog-bar');
            const text = document.getElementById('prog-text');
            const debug = document.getElementById('debug-msg');
            const btn = document.getElementById('upload-btn');

            btn.disabled = true;
            debug.innerText = "Leyendo archivo...";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                const lines = content.split(/\r?\n/).filter(l => l.trim() !== "");
                const total = lines.length - 1;
                
                barContainer.style.display = 'block';
                debug.innerText = "Iniciando subida a Firebase...";

                let batch = db.batch();
                let count = 0;
                let processed = 0;

                for (let i = 1; i < lines.length; i++) {
                    const col = lines[i].split(lines[i].includes(';') ? ';' : ',');
                    
                    if (col[0]) {
                        // Limpiar el código de barras de caracteres extraños (BOM)
                        const rawCode = col[0].trim().replace(/[^\w\s-]/gi, '');
                        const ref = db.collection("productos").doc(rawCode);
                        
                        batch.set(ref, {
                            nombre: col[1] ? col[1].trim() : "Sin nombre",
                            precio: col[2] ? col[2].trim() : "0",
                            stock: col[3] ? parseInt(col[3]) : 0,
                            costo: col[4] ? col[4].trim() : "0"
                        });

                        count++;
                        processed++;

                        // Cada 400 productos, enviamos el lote y actualizamos la interfaz
                        if (count === 400 || i === lines.length - 1) {
                            await batch.commit();
                            
                            // Actualizar barra
                            let porc = Math.round((processed / total) * 100);
                            bar.style.width = porc + "%";
                            text.innerText = `${porc}% (${processed} de ${total})`;
                            debug.innerText = "Subiendo datos... no cierre la página";

                            batch = db.batch();
                            count = 0;
                            
                            // Truco: Pausa de 100ms para que el navegador pueda dibujar el progreso
                            await new Promise(resolve => setTimeout(resolve, 100));
                        }
                    }
                }

                debug.innerText = "¡TODO LISTO!";
                debug.style.color = "green";
                btn.disabled = false;
                alert("Base de datos cargada correctamente");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #ddd; background: #000; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; text-align: center; }
        .product-title { font-size: 1.2rem; font-weight: bold; }
        .product-price { font-size: 2.5rem; color: var(--s); font-weight: 800; margin: 10px 0; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed var(--p); }
        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:white">Acceso al Sistema</h2>
        <input type="password" id="pin" placeholder="PIN de 4 dígitos" style="padding:15px; border-radius:10px; border:none; text-align:center; font-size:1.2rem; width: 200px;">
        <button onclick="access()" style="width:150px; background:white; color:var(--p); margin-top: 20px;">ENTRAR</button>
    </div>

    <header>CONSULTA DE PRECIOS E INVENTARIO</header>

    <div class="container">
        <div id="reader"></div>
        <p style="text-align:center; color:#64748b">Apunta al código de barras</p>

        <div id="result-card" class="card">
            <div id="res-nombre" class="product-title">Nombre del Producto</div>
            <div id="res-precio" class="product-price">$ 0.00</div>
            <p id="res-stock">Stock actual: 0</p>
            
            <div style="background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom: 10px;">
                <label>Sumar al Inventario:</label><br>
                <input type="number" id="qty" value="1" style="width:80px; padding:8px; margin:5px; border-radius: 5px; border: 1px solid #ccc;">
                <button class="btn-green" onclick="addStock()">SUMAR STOCK</button>
            </div>
            
            <button class="btn-blue" onclick="resetScanner()">SIGUIENTE ESCANEO</button>
        </div>

        <button id="admin-btn" style="display:none; background:#64748b; color:white; margin-top: 20px;" onclick="toggleAdmin()">⚙️ CARGAR LISTA (CSV)</button>

        <div id="admin-panel">
            <h3>Panel de Administrador</h3>
            <p style="font-size: 0.8rem;">Formato CSV: codigo, nombre, precio, stock</p>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn-green" onclick="uploadData()">ACTUALIZAR NUBE</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN FIREBASE (COMPAT) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Habilitar persistencia offline
        db.enablePersistence().catch(err => console.error("Error persistencia:", err.code));

        let currentCode = "";
        const scanner = new Html5Qrcode("reader");

        // --- 2. CONTROL DE ACCESO ---
        function access() {
            const p = document.getElementById('pin').value;
            // Admin entra con 1234, otros con cualquier otro PIN (ej. 0000)
            if(p === "1234") { 
                document.getElementById('admin-btn').style.display = 'block';
            }
            document.getElementById('login-screen').style.display = 'none';
            initScanner();
        }

        // --- 3. LÓGICA DEL ESCÁNER ---
        function initScanner() {
            scanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } }, 
                onScan
            ).catch(err => alert("Error cámara: " + err));
        }

        async function onScan(code) {
            currentCode = code;
            window.navigator.vibrate(100);
            await scanner.pause(true);

            try {
                const doc = await db.collection("productos").doc(code).get();
                document.getElementById('result-card').style.display = 'block';

                if(doc.exists) {
                    const p = doc.data();
                    document.getElementById('res-nombre').innerText = p.nombre;
                    document.getElementById('res-precio').innerText = `$ ${p.precio}`;
                    document.getElementById('res-stock').innerText = `Stock: ${p.stock || 0}`;
                } else {
                    document.getElementById('res-nombre').innerText = "PRODUCTO NO ENCONTRADO";
                    document.getElementById('res-precio').innerText = "---";
                    document.getElementById('res-stock').innerText = "Código escaneado: " + code;
                }
            } catch (error) {
                console.error("Error buscando:", error);
            }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        // --- 4. AGREGAR STOCK ---
        async function addStock() {
            const n = parseInt(document.getElementById('qty').value);
            try {
                await db.collection("productos").doc(currentCode).set({
                    stock: firebase.firestore.FieldValue.increment(n)
                }, {merge: true});
                alert("Stock actualizado");
                resetScanner();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        // --- 5. ADMIN CARGA ---
        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        async function uploadData() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona el archivo CSV primero");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split("\n");
                const batch = db.batch();
                let count = 0;
                
                for(let i=1; i<lines.length; i++) {
                    const col = lines[i].split(",");
                    if(col.length >= 3) {
                        const ref = db.collection("productos").doc(col[0].trim());
                        batch.set(ref, {
                            nombre: col[1].trim(),
                            precio: col[2].trim(),
                            stock: parseInt(col[3]) || 0
                        });
                        count++;
                    }
                }
                await batch.commit();
                alert("¡Carga exitosa! " + count + " productos actualizados.");
                toggleAdmin();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>

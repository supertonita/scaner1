<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - V5 Final</title>
    
    <!-- Librerías -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        #reader { width: 100% !important; border-radius: 20px; overflow: hidden; border: 4px solid #cbd5e1; background: #000; }
        
        /* Barra de progreso */
        .progress-box { background: white; padding: 20px; border-radius: 15px; border: 1px solid #cbd5e1; margin: 20px 0; display: none; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 15px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--s); transition: width 0.3s; }

        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); display: none; border: 1px solid #e2e8f0; }
        .price-tag { font-size: 2.5rem; color: var(--s); font-weight: 900; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.8rem; color: #64748b; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        .btn-dark { background: #1e293b; color: white; }

        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #login-screen input { width: 180px; text-align: center; font-size: 1.8rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:white; margin-bottom:10px;">Inventario Pro</h1>
        <input type="password" id="pin" placeholder="****" inputmode="numeric">
        <button onclick="access()" style="width:180px; background:white; color:var(--p);">ENTRAR</button>
    </div>

    <header>SISTEMA DE GESTIÓN V5</header>

    <div class="container">
        <div id="reader"></div>

        <div id="result-card" class="card">
            <div id="res-nombre" style="font-weight:bold; text-align:center; font-size: 1.2rem;">---</div>
            <div id="res-precio" class="price-tag">$ 0.00</div>
            <div style="text-align:center; background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom:15px;">
                Stock Actual: <b id="res-stock">0</b>
            </div>

            <div id="admin-fields" style="display:none;">
                <div class="form-group">
                    <label>Nombre del Producto:</label>
                    <input type="text" id="edit-name">
                </div>
                <div class="form-group">
                    <label>Precio de Venta:</label>
                    <input type="number" id="edit-price">
                </div>
                <div class="form-group">
                    <label>Sumar al Inventario (+):</label>
                    <input type="number" id="qty" value="0" style="color:var(--s); font-weight:bold;">
                </div>
                <button class="btn-green" onclick="saveData()">💾 GUARDAR CAMBIOS</button>
            </div>
            <button class="btn-blue" onclick="resetScanner()">← VOLVER A ESCANEAR</button>
        </div>

        <button id="admin-panel-btn" style="display:none;" class="btn-dark" onclick="togglePanel()">⚙️ PANEL DE CONTROL</button>
        
        <div id="master-panel" style="display:none; background:white; padding:20px; border-radius:15px; margin-top:20px; border:1px solid #ddd;">
            <h3 style="margin-top:0;">Carga Masiva Masiva</h3>
            <p style="font-size:0.75rem; color:#64748b;">Columnas: <b>codigo;nombre;precio;stock</b></p>
            <input type="file" id="csvFile" accept=".csv">
            
            <div id="prog-box" class="progress-box">
                <div class="progress-container"><div id="prog-bar" class="progress-bar"></div></div>
                <p id="prog-text" style="text-align:center; font-size:0.8rem; margin-top:10px; font-weight:bold; color:var(--p);"></p>
            </div>

            <button class="btn-blue" onclick="startUpload()">🚀 ACTUALIZAR TODA LA BASE</button>
            
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            
            <h3>Reportes</h3>
            <button class="btn-green" style="background:#166534;" onclick="exportToExcel()">📊 EXPORTAR A EXCEL (CONTADOR)</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;
        let currentCode = "";
        const scanner = new Html5Qrcode("reader");

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "1234") { isAdmin = true; document.getElementById('admin-panel-btn').style.display = 'block'; }
            if(pin === "1234" || pin === "0000") {
                document.getElementById('login-screen').style.display = 'none';
                scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
            }
        }

        async function onScan(code) {
            currentCode = code.trim();
            await scanner.pause(true);
            const doc = await db.collection("productos").doc(currentCode).get();
            document.getElementById('result-card').style.display = 'block';

            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre || "Sin Nombre";
                document.getElementById('res-precio').innerText = `$ ${parseFloat(p.precio || 0).toLocaleString()}`;
                document.getElementById('res-stock').innerText = p.stock || 0;
                if(isAdmin) {
                    document.getElementById('admin-fields').style.display = 'block';
                    document.getElementById('edit-name').value = p.nombre;
                    document.getElementById('edit-price').value = p.precio;
                }
            } else {
                document.getElementById('res-nombre').innerText = "PRODUCTO NUEVO";
                if(isAdmin) {
                    document.getElementById('admin-fields').style.display = 'block';
                    document.getElementById('edit-name').value = "";
                    document.getElementById('edit-price').value = "";
                }
            }
        }

        async function saveData() {
            const addQty = parseInt(document.getElementById('qty').value) || 0;
            const data = {
                nombre: document.getElementById('edit-name').value.trim(),
                precio: parseFloat(document.getElementById('edit-price').value) || 0,
                stock: firebase.firestore.FieldValue.increment(addQty)
            };
            await db.collection("productos").doc(currentCode).set(data, {merge: true});
            alert("✅ ¡Actualizado correctamente!");
            resetScanner();
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('qty').value = 0;
            scanner.resume();
        }

        function togglePanel() {
            const m = document.getElementById('master-panel');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        // --- LÓGICA DE CARGA INFINITA (MÁS DE 2000+) ---
        function startUpload() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Por favor selecciona el archivo CSV primero.");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                const separator = content.includes(';') ? ';' : ',';
                const lines = content.split(/\r?\n/).filter(l => l.trim().length > 5);
                const dataLines = lines.slice(1);
                
                document.getElementById('prog-box').style.display = 'block';
                uploadRecursive(dataLines, 0, separator);
            };
            reader.readAsText(file);
        }

        async function uploadRecursive(lines, index, sep) {
            const batchSize = 100; // Bloque pequeño para evitar bloqueos en iPhone
            const end = Math.min(index + batchSize, lines.length);
            const batch = db.batch();

            for (let i = index; i < end; i++) {
                const cols = lines[i].split(sep);
                const codigo = cols[0] ? cols[0].trim() : null;
                if (codigo) {
                    const ref = db.collection("productos").doc(codigo);
                    batch.set(ref, {
                        nombre: cols[1] ? cols[1].trim() : "Producto Sin Nombre",
                        precio: cols[2] ? parseFloat(cols[2].replace(',', '.')) : 0,
                        stock: 0 // Reset para conteo físico
                    }, { merge: true });
                }
            }

            try {
                await batch.commit();
                const processed = end;
                const percent = Math.round((processed / lines.length) * 100);
                
                document.getElementById('prog-bar').style.width = percent + "%";
                document.getElementById('prog-text').innerText = `Procesado: ${processed} de ${lines.length} (${percent}%)`;

                if (end < lines.length) {
                    // Pausa de 200ms para liberar memoria del navegador
                    setTimeout(() => uploadRecursive(lines, end, sep), 200);
                } else {
                    document.getElementById('prog-text').innerText = "✅ CARGA COMPLETA EXITOSA";
                    alert("¡Todo listo, parce! Base de datos de " + lines.length + " productos actualizada.");
                }
            } catch (err) {
                console.error(err);
                alert("Error en la red. Reintentando lote...");
                setTimeout(() => uploadRecursive(lines, index, sep), 1000);
            }
        }

        async function exportToExcel() {
            const snap = await db.collection("productos").get();
            const rows = [];
            let totalGeneral = 0;
            snap.forEach(doc => {
                const p = doc.data();
                const total = (p.precio || 0) * (p.stock || 0);
                totalGeneral += total;
                rows.push({
                    "CODIGO": doc.id,
                    "PRODUCTO": p.nombre,
                    "PRECIO UNT": p.precio || 0,
                    "STOCK ACTUAL": p.stock || 0,
                    "SUBTOTAL": total
                });
            });
            rows.push({}); 
            rows.push({ "PRODUCTO": "VALOR TOTAL INVENTARIO", "SUBTOTAL": totalGeneral });

            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Reporte");
            XLSX.writeFile(wb, "Inventario_Contable.xlsx");
        }
    </script>
</body>
</html>

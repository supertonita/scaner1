<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - Carga Masiva</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Estilos de la Barra de Progreso Mejorada */
        .progress-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin: 15px 0; display: none; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 25px; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: var(--s); transition: width 0.2s ease-in-out; }
        #prog-text { text-align: center; font-weight: bold; font-size: 0.9rem; margin-top: 8px; color: var(--p); }

        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); display: none; border: 1px solid #e2e8f0; }
        .price-venta { font-size: 2.5rem; color: var(--s); font-weight: 900; text-align: center; }
        
        input[type="file"] { width: 100%; margin: 10px 0; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #cbd5e1; }
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }

        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #login-screen input { padding: 18px; border-radius: 12px; border: none; text-align: center; font-size: 1.8rem; width: 180px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:white;">Inventario Pro</h1>
        <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
        <button onclick="access()" style="width:180px; background:white; color:var(--p);">ENTRAR</button>
    </div>

    <header>SISTEMA DE CARGA POR LOTES</header>

    <div class="container">
        <div id="reader"></div>

        <div id="result-card" class="card">
            <div id="res-nombre" style="font-weight:bold; text-align:center;">---</div>
            <div id="res-precio-venta" class="price-venta">$ 0.00</div>
            <button class="btn-blue" onclick="resetScanner()">CONTINUAR</button>
        </div>

        <button id="admin-panel-btn" style="display:none;" class="btn-blue" onclick="togglePanel()">⚙️ PANEL DE CARGA</button>
        
        <div id="master-panel" style="display:none; background:white; padding:20px; border-radius:15px; margin-top:20px;">
            <h3>Subir Inventario (CSV)</h3>
            <p style="font-size:0.75rem; color:#64748b;">Formato: codigo;nombre;costo;venta</p>
            <input type="file" id="csvFile" accept=".csv">
            
            <div id="prog-box" class="progress-box">
                <div class="progress-container">
                    <div id="prog-bar" class="progress-bar"></div>
                </div>
                <p id="prog-text">Esperando inicio...</p>
            </div>

            <button class="btn-green" onclick="startBulkUpload()">🚀 INICIAR SUBIDA POR PARTES</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (Mantener igual)
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;
        const scanner = new Html5Qrcode("reader");

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "1234") { isAdmin = true; document.getElementById('admin-panel-btn').style.display = 'block'; }
            if(pin === "1234" || pin === "0000") {
                document.getElementById('login-screen').style.display = 'none';
                scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
            }
        }

        async function onScan(code) {
            await scanner.pause(true);
            const doc = await db.collection("productos").doc(code).get();
            document.getElementById('result-card').style.display = 'block';
            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre;
                document.getElementById('res-precio-venta').innerText = `$ ${parseFloat(p.precio_venta || 0).toLocaleString()}`;
            } else {
                document.getElementById('res-nombre').innerText = "NO ENCONTRADO";
            }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        function togglePanel() {
            const m = document.getElementById('master-panel');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        // LÓGICA DE CARGA POR PARTES (RECURSIVA)
        function startBulkUpload() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona el archivo CSV");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                const separator = content.includes(';') ? ';' : ',';
                const lines = content.split(/\r?\n/).filter(l => l.trim() !== "");
                const dataLines = lines.slice(1); // Quitamos cabecera
                
                document.getElementById('prog-box').style.display = 'block';
                processBatch(dataLines, 0, separator);
            };
            reader.readAsText(file);
        }

        async function processBatch(lines, startIndex, separator) {
            const batchSize = 200; // Subimos de 200 en 200 para no saturar
            const endIndex = Math.min(startIndex + batchSize, lines.length);
            const batch = db.batch();

            for (let i = startIndex; i < endIndex; i++) {
                const col = lines[i].split(separator);
                if (col[0]) {
                    const ref = db.collection("productos").doc(col[0].trim());
                    batch.set(ref, {
                        nombre: col[1] ? col[1].trim() : "Sin nombre",
                        precio_costo: col[2] ? parseFloat(col[2].replace(',', '.')) : 0,
                        precio_venta: col[3] ? parseFloat(col[3].replace(',', '.')) : 0,
                        stock: 0
                    }, { merge: true });
                }
            }

            try {
                await batch.commit();
                
                // Actualizar barra
                const processed = endIndex;
                const total = lines.length;
                const percent = Math.round((processed / total) * 100);
                
                document.getElementById('prog-bar').style.width = percent + "%";
                document.getElementById('prog-text').innerText = `Procesado: ${processed} de ${total} (${percent}%)`;

                if (endIndex < lines.length) {
                    // Llamada recursiva para el siguiente bloque
                    setTimeout(() => processBatch(lines, endIndex, separator), 300); 
                } else {
                    document.getElementById('prog-text').innerText = "✅ CARGA COMPLETA";
                    alert("¡Todo listo, parce! 4000+ productos actualizados.");
                }
            } catch (err) {
                console.error(err);
                alert("Error en lote: " + err.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - iPhone Ready</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; touch-action: manipulation; }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Contenedor de cámara optimizado para iOS */
        #reader { 
            width: 100% !important; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 4px solid #cbd5e1; 
            background: #000;
            position: relative;
        }
        
        #reader video { object-fit: cover !important; }

        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); display: none; text-align: center; border: 1px solid #e2e8f0; }
        .product-title { font-size: 1.3rem; font-weight: 800; color: var(--p); }
        .product-price { font-size: 2.5rem; color: var(--s); font-weight: 900; margin: 10px 0; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 1rem; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        .btn-gray { background: #64748b; color: white; }

        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed var(--p); }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #login-screen input { padding: 18px; border-radius: 12px; border: none; text-align: center; font-size: 1.8rem; width: 180px; margin-bottom: 20px; }
        
        .status-msg { color: var(--p); font-weight: bold; margin: 10px 0; display: none; padding: 10px; background: #e0e7ff; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:white; margin-bottom: 10px;">Inventario Pro</h1>
        <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
        <button onclick="access()" style="width:180px; background:white; color:var(--p);">ENTRAR</button>
    </div>

    <header id="app-header">CONSULTA DE PRECIOS</header>

    <div class="container">
        <div id="reader"></div>
        <p style="text-align:center; color:#64748b; font-size: 0.9rem; margin-top: 10px;">Enfoque el código de barras</p>

        <div id="result-card" class="card">
            <div id="res-nombre" class="product-title">---</div>
            <div id="res-precio" class="product-price">$ 0</div>
            <p id="res-stock" style="font-weight: bold;">Stock: 0</p>
            
            <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom: 10px;">
                <input type="number" id="qty" value="1" style="width:80px; padding:12px; border-radius: 8px; border: 1px solid #ccc; text-align: center; font-size: 1.2rem;">
                <button class="btn-green" onclick="addStock()">SUMAR STOCK</button>
            </div>
            
            <button class="btn-blue" onclick="resetScanner()">CONTINUAR</button>
        </div>

        <button id="admin-btn" style="display:none;" class="btn-gray" onclick="toggleAdmin()">⚙️ CARGA MASIVA (ADMIN)</button>

        <div id="admin-panel">
            <h3>Carga de Datos (CSV)</h3>
            <input type="file" id="csvFile" accept=".csv">
            <div id="loading-msg" class="status-msg"></div>
            <button class="btn-green" onclick="uploadData()">🚀 SUBIR A FIREBASE</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Escáner con soporte total de formatos para iPhone
        const scanner = new Html5Qrcode("reader", { 
            verbose: false,
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.EAN_13, 
                Html5QrcodeSupportedFormats.EAN_8, 
                Html5QrcodeSupportedFormats.CODE_128, 
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E
            ]
        });

        let currentCode = "";

        function access() {
            const p = document.getElementById('pin').value;
            if(p === "1234") { 
                document.getElementById('admin-btn').style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                initScanner();
            } else if (p === "0000") {
                document.getElementById('login-screen').style.display = 'none';
                initScanner();
            } else { alert("PIN Incorrecto"); }
        }

        // Función de inicio optimizada para iOS
        function initScanner() {
            const config = { 
                fps: 20, 
                qrbox: { width: 260, height: 160 },
                aspectRatio: 1.0,
                videoConstraints: {
                    facingMode: "environment",
                    focusMode: "continuous"
                }
            };

            scanner.start({ facingMode: "environment" }, config, onScan)
            .catch(err => alert("Error cámara: Activa permisos o usa Safari/HTTPS"));
        }

        async function onScan(code) {
            currentCode = code;
            if (window.navigator.vibrate) window.navigator.vibrate(100);
            await scanner.pause(true);

            try {
                const doc = await db.collection("productos").doc(code).get();
                document.getElementById('result-card').style.display = 'block';

                if(doc.exists) {
                    const p = doc.data();
                    document.getElementById('res-nombre').innerText = p.nombre;
                    document.getElementById('res-precio').innerText = `$ ${p.precio}`;
                    document.getElementById('res-stock').innerText = `Stock: ${p.stock || 0}`;
                } else {
                    document.getElementById('res-nombre').innerText = "PRODUCTO NO EXISTE";
                    document.getElementById('res-precio').innerText = "---";
                    document.getElementById('res-stock').innerText = "Código: " + code;
                }
            } catch (e) { console.error(e); }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        async function addStock() {
            const n = parseInt(document.getElementById('qty').value);
            try {
                await db.collection("productos").doc(currentCode).set({
                    stock: firebase.firestore.FieldValue.increment(n)
                }, {merge: true});
                alert("Stock actualizado");
                resetScanner();
            } catch (e) { alert("Error de permisos en Firebase"); }
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // CARGA MASIVA PARA 4000+ FILAS
        async function uploadData() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona un CSV");

            const msg = document.getElementById('loading-msg');
            msg.style.display = 'block';
            msg.innerText = "Procesando archivo...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const content = e.target.result;
                    const separator = content.includes(';') ? ';' : ','; 
                    const lines = content.split("\n");
                    let batch = db.batch();
                    let count = 0;
                    let total = 0;
                    
                    for(let i = 1; i < lines.length; i++) {
                        const col = lines[i].split(separator);
                        if(col[0] && col[0].trim() !== "") {
                            const cleanCode = col[0].trim().replace(/\//g, '-').replace(/\./g, '-').replace(/\s+/g, '_');
                            const ref = db.collection("productos").doc(cleanCode);
                            batch.set(ref, {
                                nombre: col[1] ? col[1].trim() : "Sin nombre",
                                precio: col[2] ? col[2].trim() : "0",
                                stock: col[3] ? (parseInt(col[3]) || 0) : 0
                            });
                            count++; total++;
                            if (count === 450) {
                                await batch.commit();
                                batch = db.batch(); count = 0;
                                msg.innerText = `Cargando: ${total} productos...`;
                            }
                        }
                    }
                    if (count > 0) await batch.commit();
                    msg.style.display = 'none';
                    alert("¡ÉXITO! Base de datos actualizada.");
                    toggleAdmin();
                } catch (error) { alert("Error: " + error.message); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>

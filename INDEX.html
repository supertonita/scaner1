<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro V2</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: system-ui; margin: 0; background: var(--bg); color: #1e293b; }
        
        header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Cámara */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #ddd; background: #000; }

        /* Tarjeta de Resultados (Consulta de precios) */
        .card { 
            background: white; padding: 20px; border-radius: 15px; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; text-align: center;
        }
        .product-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .product-price { font-size: 2.5rem; color: var(--s); font-weight: 800; margin: 10px 0; }
        
        /* Botones */
        button { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        
        /* Admin Section */
        #admin-panel { 
            display: none; background: #fff; padding: 20px; border-radius: 15px; 
            margin-top: 20px; border: 2px dashed var(--p);
        }

        /* Login */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--p);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:white">Acceso al Sistema</h2>
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; border-radius:10px; border:none; text-align:center; font-size:1.2rem">
        <button onclick="access()" style="width:150px; background:white; color:var(--p)">ENTRAR</button>
    </div>

    <header>CONSULTA DE PRECIOS E INVENTARIO</header>

    <div class="container">
        <div id="reader"></div>
        <p style="text-align:center; color:#64748b">Apunta al código de barras</p>

        <div id="result-card" class="card">
            <div id="res-nombre" class="product-title">Nombre del Producto</div>
            <div id="res-precio" class="product-price">$ 0.00</div>
            <p id="res-stock">Stock actual: 0</p>
            
            <div style="background:#f1f5f9; padding:10px; border-radius:10px;">
                <label>Agregar al Inventario:</label>
                <input type="number" id="qty" value="1" style="width:60px; padding:5px; margin:5px">
                <button class="btn-green" onclick="addStock()">SUMAR STOCK</button>
            </div>
            
            <button class="btn-blue" onclick="resetScanner()">VOLVER A ESCANEAR</button>
        </div>

        <button id="admin-btn" style="display:none; background:#64748b; color:white" onclick="toggleAdmin()">⚙️ CARGAR LISTA DE PRODUCTOS</button>

        <div id="admin-panel">
            <h3>Panel de Administrador</h3>
            <p>Carga tu CSV (columnas: codigo, nombre, precio, stock)</p>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn-green" onclick="uploadData()">SUBIR A LA NUBE</button>
        </div>
    </div>

    <script>
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
  authDomain: "scarner-dc97a.firebaseapp.com",
  projectId: "scarner-dc97a",
  storageBucket: "scarner-dc97a.firebasestorage.app",
  messagingSenderId: "457706973960",
  appId: "1:457706973960:web:017a2bb1997748080c1abd",
  measurementId: "G-6ZFFB0TD70"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence(); // Activa modo OFFLINE

        let currentCode = "";

        // 2. CONTROL DE ACCESO
        function access() {
            const p = document.getElementById('pin').value;
            if(p === "1234") { // TU PIN
                document.getElementById('admin-btn').style.display = 'block';
            }
            document.getElementById('login-screen').style.display = 'none';
            initScanner();
        }

        // 3. LÓGICA DEL ESCÁNER (CONSULTA)
        const scanner = new Html5Qrcode("reader");
        
        function initScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
        }

        async function onScan(code) {
            currentCode = code;
            window.navigator.vibrate(100);
            await scanner.pause(true);

            // Consulta inmediata en la base de datos
            const doc = await db.collection("productos").doc(code).get();
            document.getElementById('result-card').style.display = 'block';

            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre;
                document.getElementById('res-precio').innerText = `$ ${p.precio}`;
                document.getElementById('res-stock').innerText = `Stock: ${p.stock || 0}`;
            } else {
                document.getElementById('res-nombre').innerText = "PRODUCTO NO EXISTE";
                document.getElementById('res-precio').innerText = "---";
                document.getElementById('res-stock').innerText = "Código: " + code;
            }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        // 4. AGREGAR INVENTARIO
        async function addStock() {
            const n = parseInt(document.getElementById('qty').value);
            await db.collection("productos").doc(currentCode).set({
                stock: firebase.firestore.FieldValue.increment(n)
            }, {merge: true});
            alert("Inventario sumado");
            resetScanner();
        }

        // 5. CARGA DE LISTA (ADMIN)
        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        async function uploadData() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona el CSV");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split("\n");
                const batch = db.batch();
                
                for(let i=1; i<lines.length; i++) {
                    const col = lines[i].split(",");
                    if(col.length >= 3) {
                        const ref = db.collection("productos").doc(col[0].trim());
                        batch.set(ref, {
                            nombre: col[1].trim(),
                            precio: col[2].trim(),
                            stock: parseInt(col[3]) || 0
                        });
                    }
                }
                await batch.commit();
                alert("Lista cargada con éxito");
                toggleAdmin();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>

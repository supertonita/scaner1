<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - </title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Librería para exportar a Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>
    
    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; background: #000; }
        .card { background: white; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; text-align: center; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-green { background: var(--s); color: white; }
        .btn-blue { background: var(--p); color: white; }
        .btn-gray { background: #64748b; color: white; margin-top: 20px; }
        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed var(--p); }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 50px; margin: 20px 0; display: none; height: 25px; position: relative; overflow: hidden; }
        #prog-bar { height: 100%; background: var(--s); width: 0%; transition: width 0.3s; }
        #monitor-consola { background: #0f172a; color: #38bdf8; font-family: monospace; font-size: 0.75rem; padding: 12px; border-radius: 8px; margin-top: 15px; height: 120px; overflow-y: auto; display: none; }
        .user-badge { background: #dbeafe; color: var(--p); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--p); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; width: 80%; max-width: 350px;">
            <h2 style="color:var(--p)">Acceso Personal</h2>
            <input type="password" id="pin" placeholder="Introduce tu PIN" style="padding:15px; border-radius:10px; border:2px solid #e2e8f0; margin-bottom:15px; text-align:center; font-size: 1.2rem; width:100%; box-sizing:border-box;">
            <button onclick="access()" class="btn-green">INGRESAR</button>
            <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 15px;"></p>
        </div>
    </div>

    <header>INVENTARIO PRO</header>

    <div class="container">
        <div id="user-info" class="user-badge" style="display:none;"></div>
        <div id="reader"></div>
        
        <div id="result-card" class="card">
            <h2 id="res-nombre"></h2>
            <h1 id="res-precio"></h1>
            <p id="res-stock"></p>
            <button class="btn-green" onclick="resetScanner()">CONTINUAR</button>
        </div>

        <!-- Solo para Admin -->
        <button id="admin-btn" style="display:none;" class="btn-gray" onclick="toggleAdmin()">⚙️ PANEL ADMINISTRACIÓN</button>

        <div id="admin-panel">
            <h3 style="margin-top:0">Herramientas Master</h3>
            
            <button class="btn-blue" onclick="downloadExcel()">📊 DESCARGAR EXCEL PARA RENTA</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e2e8f0;">
            
            <h4>Carga Masiva (CSV)</h4>
            <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
            <div id="prog-container" class="progress-container"><div id="prog-bar"></div></div>
            <button class="btn-green" id="upload-btn" onclick="uploadData()">🚀 ACTUALIZAR NUBE</button>
            <div id="monitor-consola"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userRole = "";

        function access() {
            const p = document.getElementById('pin').value;
            const badge = document.getElementById('user-info');
            if(p === "1234") { 
                userRole = "ADMIN";
                document.getElementById('admin-btn').style.display = 'block';
            } else if (p === "5555" || p === "7777") {
                userRole = "COLABORADOR";
            } else {
                return alert("PIN NO VÁLIDO");
            }
            badge.innerText = "SESIÓN: " + userRole;
            badge.style.display = "inline-block";
            document.getElementById('login-screen').style.display = 'none';
            initScanner();
        }

        const scanner = new Html5Qrcode("reader");
        function initScanner() {
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (code) => onScan(code));
        }

        async function onScan(code) {
            await scanner.pause(true);
            const cleanCode = code.trim().replace(/[^0-9]/g, '');
            const doc = await db.collection("productos").doc(cleanCode).get();
            document.getElementById('result-card').style.display = 'block';
            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre;
                document.getElementById('res-precio').innerText = `$${p.precio}`;
                document.getElementById('res-stock').innerText = `Stock Actual: ${p.stock}`;
            } else {
                document.getElementById('res-nombre').innerText = "NO ENCONTRADO";
                document.getElementById('res-precio').innerText = "---";
                document.getElementById('res-stock').innerText = "ID: " + cleanCode;
            }
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            scanner.resume();
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // --- EXPORTAR A EXCEL ---
        async function downloadExcel() {
            alert("Preparando base de datos, espera un momento...");
            const snapshot = await db.collection("productos").get();
            const data = snapshot.docs.map(doc => ({
                Codigo: doc.id,
                Nombre: doc.data().nombre,
                Precio_Venta: doc.data().precio,
                Stock: doc.data().stock,
                Costo_Compra: doc.data().costo
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, "Inventario_Declaracion_Renta.xlsx");
        }

        // --- CARGA MASIVA REFORZADA ---
        async function uploadData() {
            const fileInput = document.getElementById('csvFile');
            const monitor = document.getElementById('monitor-consola');
            const bar = document.getElementById('prog-bar');
            const btn = document.getElementById('upload-btn');

            if(!fileInput.files[0]) return alert("Selecciona el CSV");

            btn.disabled = true;
            monitor.style.display = 'block';
            document.getElementById('prog-container').style.display = 'block';
            monitor.innerHTML = "> Leyendo archivo...<br>";

            const reader = new FileReader();
            reader.readAsText(fileInput.files[0], 'CP1252');

            reader.onload = async (e) => {
                try {
                    const rows = e.target.result.split(/\r?\n/).filter(l => l.trim().length > 5);
                    let batch = db.batch();
                    let count = 0;
                    let processed = 0;

                    for (let i = 1; i < rows.length; i++) {
                        const delim = rows[i].includes(';') ? ';' : ',';
                        const cols = rows[i].split(delim);
                        
                        // Validar que la primera columna no tenga letras (evita el error de nombre por código)
                        const rawCode = cols[0].trim();
                        if (/[a-zA-Z]/.test(rawCode)) continue; 

                        const code = rawCode.replace(/[^0-9]/g, '');
                        if (code.length < 5) continue;

                        const ref = db.collection("productos").doc(code);
                        batch.set(ref, {
                            nombre: (cols[1] || "S/N").trim(),
                            precio: (cols[2] || "0").trim().replace(',', '.'),
                            stock: parseInt(cols[3]) || 0,
                            costo: (cols[4] || "0").trim().replace(',', '.')
                        });

                        count++;
                        processed++;

                        if (count === 300 || i === rows.length - 1) {
                            await batch.commit();
                            batch = db.batch();
                            count = 0;
                            bar.style.width = Math.round((processed/(rows.length-1))*100) + "%";
                            monitor.innerHTML += "> Procesados " + processed + "...<br>";
                            monitor.scrollTop = monitor.scrollHeight;
                        }
                    }
                    alert("Carga completada con éxito");
                } catch (err) {
                    monitor.innerHTML += "!! ERROR: " + err.message;
                    if(err.message.includes("quota")) alert("Límite diario de Firebase alcanzado. Intenta mañana.");
                } finally {
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>

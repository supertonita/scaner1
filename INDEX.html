<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - Full Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        #reader { width: 100% !important; border-radius: 20px; overflow: hidden; border: 4px solid #cbd5e1; background: #000; }
        
        .progress-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin: 15px 0; display: none; }
        .progress-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 25px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--s); transition: width 0.2s; }

        .card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); display: none; border: 1px solid #e2e8f0; }
        .price-venta { font-size: 2.5rem; color: var(--s); font-weight: 900; text-align: center; }
        
        .info-interna { background: #f1f5f9; padding: 12px; border-radius: 10px; margin: 10px 0; }
        .admin-edit-panel input { width: 100%; padding: 12px; margin: 5px 0 12px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }

        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--p); color: white; }
        .btn-green { background: var(--s); color: white; }
        .btn-gray { background: #64748b; color: white; }

        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #login-screen input { padding: 18px; border-radius: 12px; border: none; text-align: center; font-size: 1.8rem; width: 180px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:white;">Inventario Pro</h1>
        <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
        <button onclick="access()" style="width:180px; background:white; color:var(--p);">ENTRAR</button>
    </div>

    <header>SISTEMA DE GESTIÓN INTEGRAL</header>

    <div class="container">
        <div id="reader"></div>

        <div id="result-card" class="card">
            <div id="res-nombre" style="font-weight:bold; text-align:center; font-size: 1.2rem;">---</div>
            <div id="res-precio" class="price-venta">$ 0.00</div>
            
            <div class="info-interna">
                <div style="display:flex; justify-content:space-between"><span>Stock Actual:</span> <b id="res-stock">0</b></div>
            </div>

            <div id="admin-fields" style="display:none;" class="admin-edit-panel">
                <label>Nombre del Producto:</label>
                <input type="text" id="edit-name">
                <label>Precio (Costo/Venta):</label>
                <input type="number" id="edit-price">
                <label>Agregar al Inventario:</label>
                <input type="number" id="qty" value="0">
                <button class="btn-green" onclick="saveData()">GUARDAR CAMBIOS</button>
            </div>
            
            <button class="btn-blue" onclick="resetScanner()">CONTINUAR ESCANEANDO</button>
        </div>

        <button id="admin-panel-btn" style="display:none;" class="btn-gray" onclick="togglePanel()">⚙️ PANEL ADMINISTRATIVO</button>
        
        <div id="master-panel" style="display:none; background:white; padding:20px; border-radius:15px; margin-top:20px; border: 1px solid #ddd;">
            <h3>1. Carga Masiva (CSV)</h3>
            <p style="font-size:0.75rem; color:#64748b;">Columnas: codigo;nombre;precio;stock</p>
            <input type="file" id="csvFile" accept=".csv">
            
            <div id="prog-box" class="progress-box">
                <div class="progress-container"><div id="prog-bar" class="progress-bar"></div></div>
                <p id="prog-text" style="text-align:center; font-size:0.8rem; margin-top:5px;"></p>
            </div>

            <button class="btn-blue" onclick="startBulkUpload()">🚀 INICIAR SUBIDA (POR PARTES)</button>
            
            <hr style="margin:20px 0;">
            
            <h3>2. Reportes para Declaración</h3>
            <button class="btn-green" style="background:#1d6f42;" onclick="exportToExcel()">📊 EXPORTAR TODO A EXCEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0DtznUYQLnCC94MvLRDFi-bOsPslCxbA",
            authDomain: "scarner-dc97a.firebaseapp.com",
            projectId: "scarner-dc97a",
            storageBucket: "scarner-dc97a.firebasestorage.app",
            messagingSenderId: "457706973960",
            appId: "1:457706973960:web:017a2bb1997748080c1abd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;
        let currentCode = "";
        const scanner = new Html5Qrcode("reader");

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "1234") { isAdmin = true; document.getElementById('admin-panel-btn').style.display = 'block'; }
            if(pin === "1234" || pin === "0000") {
                document.getElementById('login-screen').style.display = 'none';
                scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
            }
        }

        async function onScan(code) {
            currentCode = code;
            await scanner.pause(true);
            const doc = await db.collection("productos").doc(code).get();
            document.getElementById('result-card').style.display = 'block';

            if(doc.exists) {
                const p = doc.data();
                document.getElementById('res-nombre').innerText = p.nombre;
                document.getElementById('res-precio').innerText = `$ ${parseFloat(p.precio || 0).toLocaleString()}`;
                document.getElementById('res-stock').innerText = p.stock || 0;
                
                if(isAdmin) {
                    document.getElementById('admin-fields').style.display = 'block';
                    document.getElementById('edit-name').value = p.nombre;
                    document.getElementById('edit-price').value = p.precio;
                }
            } else {
                document.getElementById('res-nombre').innerText = "NUEVO PRODUCTO";
                document.getElementById('res-precio').innerText = "$ 0";
                document.getElementById('res-stock').innerText = "0";
                if(isAdmin) {
                    document.getElementById('admin-fields').style.display = 'block';
                    document.getElementById('edit-name').value = "";
                    document.getElementById('edit-price').value = "";
                }
            }
        }

        async function saveData() {
            const addQty = parseInt(document.getElementById('qty').value) || 0;
            const data = {
                nombre: document.getElementById('edit-name').value,
                precio: parseFloat(document.getElementById('edit-price').value) || 0,
                stock: firebase.firestore.FieldValue.increment(addQty)
            };
            await db.collection("productos").doc(currentCode).set(data, {merge: true});
            alert("¡Actualizado!");
            resetScanner();
        }

        function resetScanner() {
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('qty').value = 0;
            scanner.resume();
        }

        function togglePanel() {
            const m = document.getElementById('master-panel');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        // CARGA MASIVA CON LOS CAMPOS: codigo, nombre, precio, stock
        function startBulkUpload() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecciona el archivo");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                const separator = content.includes(';') ? ';' : ',';
                const lines = content.split(/\r?\n/).filter(l => l.trim() !== "");
                const dataLines = lines.slice(1);
                
                document.getElementById('prog-box').style.display = 'block';
                processBatch(dataLines, 0, separator);
            };
            reader.readAsText(file);
        }

        async function processBatch(lines, startIndex, separator) {
            const batchSize = 250;
            const endIndex = Math.min(startIndex + batchSize, lines.length);
            const batch = db.batch();

            for (let i = startIndex; i < endIndex; i++) {
                const col = lines[i].split(separator);
                if (col[0]) {
                    const ref = db.collection("productos").doc(col[0].trim());
                    batch.set(ref, {
                        nombre: col[1] ? col[1].trim() : "Sin nombre",
                        precio: col[2] ? parseFloat(col[2].replace(',', '.')) : 0,
                        stock: 0 // Siempre inicializa en 0 según tu requerimiento
                    }, { merge: true });
                }
            }

            await batch.commit();
            const percent = Math.round((endIndex / lines.length) * 100);
            document.getElementById('prog-bar').style.width = percent + "%";
            document.getElementById('prog-text').innerText = `${endIndex} de ${lines.length} procesados`;

            if (endIndex < lines.length) {
                setTimeout(() => processBatch(lines, endIndex, separator), 200);
            } else {
                alert("Carga de 4000+ productos finalizada.");
                document.getElementById('prog-box').style.display = 'none';
            }
        }

        // EXPORTACIÓN PARA DECLARACIÓN
        async function exportToExcel() {
            alert("Generando reporte, espera un momento...");
            const snapshot = await db.collection("productos").get();
            const data = [];
            let granTotal = 0;

            snapshot.forEach(doc => {
                const p = doc.data();
                const totalProducto = (p.precio || 0) * (p.stock || 0);
                granTotal += totalProducto;
                data.push({
                    "Código": doc.id,
                    "Nombre": p.nombre,
                    "Precio": p.precio || 0,
                    "Stock Actual": p.stock || 0,
                    "Valor Total": totalProducto
                });
            });

            data.push({}); // Fila vacía
            data.push({ "Nombre": "TOTAL INVENTARIO", "Valor Total": granTotal });

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Declaracion");
            XLSX.writeFile(wb, "Inventario_Declaracion.xlsx");
        }
    </script>
</body>
</html>
